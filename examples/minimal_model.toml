# IbOxDummies minimal model example
#
# A minimal model with:
# - Default Ns (3 waves, 10 schools, 5 yeargroups, 1-5 classes, ~30 students)
# - One latent variable: enthusiasm
# - One random effect: per individual × wave (rare strong surge, 1% probability)
# - One questionnaire: 3-item enthusiasm scale on a 7-level (0-6) scale,
#   loading heavily onto the enthusiasm latent variable
#
# Run with:
#   ib_ox_dummies --config examples/minimal_model.toml
#
# Override individual settings from the command line, e.g.:
#   ib_ox_dummies --config examples/minimal_model.toml --nWaves 1 --seed 42

# ---------------------------------------------------------------------------
# Simulation parameters
# ---------------------------------------------------------------------------

[simulation]
nWaves                     = 3
nSchools                   = 10
nYeargroupsPerSchool       = "5"         # fixed integer
nClassesPerSchoolYeargroup = "1:5"       # uniform sample from [1, 5]
nStudentsPerClass          = "norm(30,7)" # Normal distribution
latentVariables            = ["enthusiasm"]
# seed = 42                              # uncomment for reproducible output

# ---------------------------------------------------------------------------
# Random effects
#
# One draw per unique combination of categoricalInputs.
# 'value' is a SamplerSpec string: norm(μ,σ), halfnorm(μ,σ), mde(μ,σ), etc.
# ---------------------------------------------------------------------------

# Per-individual × wave: rare strong enthusiasm surge (1% probability)
# mde(0.75,0.2) draws Normal(0.75, 0.2) with 1% probability, else 0.
# The latent variable is clamped to [0,1], so a surge of 0.75 drives enthusiasm
# toward the maximum.
[[randomEffect]]
target            = "enthusiasm"
numericalInputs   = []
categoricalInputs = ["uid", "wave"]
value             = "mde(0.75,0.2)"

# ---------------------------------------------------------------------------
# Questionnaires
#
# A minimal 3-item enthusiasm questionnaire on a 7-level (0-6) scale.
# The heavy loading (scale = 6.0) means a fully enthused student (latent = 1.0)
# maps to a mean item score of 6.0 on the 0-6 scale (near maximum).
# ---------------------------------------------------------------------------

[[questionnaire]]
name      = "Enthusiasm_3"
prefix    = "ent"
nItems    = 3
nLevels   = 7
noiseSD   = 0.8
spoilRate = 0.01
loadings  = [{latentName = "enthusiasm", scale = 6.0}]
